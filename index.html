 <canvas id="game" width="1280" height="720"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== AUDIO =====
const bgMusic = new Audio("nojisuma-bird-142545.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

const shootSound = new Audio("shoot.mp3");
shootSound.volume = 0.5;

const hitSound = new Audio("hit.mp3");
hitSound.volume = 0.6;

const collectSound = new Audio("collect.mp3");
collectSound.volume = 0.6;

// ===== STATE =====
let gameState = "menu"; // menu / playing / roll

// ===== STORAGE =====
let highScore = localStorage.getItem("highScore") || 0;
let lastScore = 0;

// ===== PLAYER =====
let player;
let bulletPower;
let baseSpeed = 2;

// ===== OBJECTS =====
let mobs, foods, bullets;

// ===== SCORE =====
let score, eaten;

// ===== INIT GAME =====
function startGame(){

    bgMusic.currentTime = 0;
    bgMusic.play();

    player = { x:0, y:0, speed:baseSpeed, color:"yellow", size:15 };
    bulletPower = 1;

    mobs = [];
    foods = [];
    bullets = [];

    score = 0;
    eaten = 0;

    gameState = "playing";
}

// ===== CAMERA =====
function camX(){ return player.x - canvas.width/2; }
function camY(){ return player.y - canvas.height/2; }

// ===== INPUT =====
let mouse = {x:0,y:0};

canvas.addEventListener("mousemove", e=>{
    mouse.x = e.offsetX;
    mouse.y = e.offsetY;
});
//click olduğunda gamestate senaryolarına göre olası çıktılar
canvas.addEventListener("click", ()=>{
    // MENU
    if (gameState === "menu"){
        startGame();
        return;
    }

    // ROLL
    if (gameState === "roll"){
        handleRoll();
        return;
    }

    if (gameState !== "playing"){
     return;}

    shoot();
});

// ===== SHOOT =====
function shoot(){

    shootSound.currentTime = 0;
    shootSound.play();

    if (mobs.length===0)
     return;
//en yakın mobu seçer
    let target = mobs.reduce((a,b)=>{
        return dist(player,a) < dist(player,b) ? a : b;
    });

   // Hedef ile oyuncu arasındaki farkı hesapla
let dx = target.x - player.x;
let dy = target.y - player.y;

// İki nokta arasındaki uzaklığı bul
let d = Math.sqrt(dx * dx + dy * dy);

// Yönü normalize et (vektörü uzunluğu 1 olacak şekilde küçült)
dx /= d;
dy /= d;

// Mermiyi oluştur ve bullets dizisine ekle
// vx ve vy = merminin x/y eksenindeki hareket hızı
bullets.push({
    x: player.x,
    y: player.y,
    vx: dx * 8,
    vy: dy * 8,
    life: 100
});
}

// ===== ROLL =====
let rollColor=null;

function handleRoll(){
    if (!rollColor){
        let colors=["green","red","blue","purple"];
        rollColor = colors[Math.floor(Math.random()*colors.length)];//randomu uzunluk ile çarpıp floor ile yuvarlar
        if (rollColor === "green") rollText = "Speed +10%";
        if (rollColor === "red") rollText = "Speed -8%";
        if (rollColor === "blue") rollText = "Bullet +1";
        if (rollColor === "purple") rollText = "Bullet -1";
    } else {
        applyBuff(rollColor);
        rollColor=null;
        rollText = "";
        gameState="playing";
    }
}

function applyBuff(c){
    player.color=c;

    if(c==="green") player.speed*=1.1;
    if(c==="red") player.speed*=0.92;

    if(c==="blue") bulletPower++;
    if(c==="purple") bulletPower=Math.max(1,bulletPower-1);
}

// ===== SPAWN =====
function spawnMob(){//mob oluşturma
    let a=Math.random()*Math.PI*2;//rastgele açı
    let d=150+Math.random()*100;  //oyuncudan ne kadar uzakta spawn olacağını belirliyor.
    mobs.push({x:player.x+Math.cos(a)*d,y:player.y+Math.sin(a)*d,hp:3});
}

function spawnFood(){//yem oluşturma
    let a=Math.random()*Math.PI*2;
    let d=200+Math.random()*150;
    foods.push({x:player.x+Math.cos(a)*d,y:player.y+Math.sin(a)*d});
}

// ===== UPDATE =====
function update(){
    if(gameState!=="playing") 
    return;

    // hareket
    let dx=mouse.x-canvas.width/2;
    let dy=mouse.y-canvas.height/2;//farenin konumunun canvasın ortasına göre uzaklığını buluyoruz
    let d=Math.sqrt(dx*dx+dy*dy);
    if(d>1){
        dx/=d;dy/=d;//playerın hareketini vektöre çeviriyoruz

    }
    player.x+=dx*player.speed;//playerın konumunun anlık olarak ekliyor
    player.y+=dy*player.speed;

    // moblar
    mobs.forEach(m=>{//mobun playerı takip etmesi
        let dx=player.x-m.x;
        let dy=player.y-m.y;
        let d=Math.sqrt(dx*dx+dy*dy);
        dx/=d;dy/=d;
        m.x+=dx*1.2;
        m.y+=dy*1.2;

        if(dist(player,m)<20){//mob playera 20 px den daha yakın olursa oyun biter
            gameOver();
        }
    });

    
    bullets.forEach((b,i)=>{
        b.x+=b.vx;//merminin hareketi
        b.y+=b.vy;
        b.life--;//her karede merminin ömrünü azaltıyoruz

        if(b.life<=0){//mermi yok olur
             bullets.splice(i,1);
             return; 
            }

        mobs.forEach((m,mi)=>{
            if(dist(b,m)<10){
                m.hp-=bulletPower;//merminin gücüne göre mobun canı azalır

                if(m.hp<=0){
                    hitSound.currentTime = 0;
                    hitSound.play();
                    foods.push({x:m.x,y:m.y});//mobun konumunda food oluşur 
                    mobs.splice(mi,1);//mob yok edilir
                }

                bullets.splice(i,1);//bullet moba temas edince yok edilir
            }
        });
    });

    // food
    foods.forEach((f,i)=>{
        if(dist(player,f)<20){

            collectSound.currentTime = 0;
            collectSound.play();

            score++;
            eaten++;
            foods.splice(i,1);

            if(eaten>=5){//eaten 5 taneden sonra roll ekranı gelir 
                eaten=0;
                gameState="roll";
            }
        }
    });
}

// ===== GAME OVER =====
function gameOver(){
    
    bgMusic.pause();
    
    lastScore = score;

    if(score > highScore){
        highScore = score;
        localStorage.setItem("highScore", highScore);//tarayıcının hafızasına kaydeder
    }

    gameState="menu";
}

// ===== DRAW =====
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ===== MENU =====
    if(gameState==="menu"){
        ctx.fillStyle="black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="white";
        ctx.font="50px Arial";
        ctx.fillText("START GAME", canvas.width/2-170, canvas.height/2);

        ctx.font="25px Arial";
        ctx.fillText("Last Score: "+lastScore, canvas.width/2-100, canvas.height/2+60);
        ctx.fillText("High Score: "+highScore, canvas.width/2-100, canvas.height/2+100);
        return;
    }

    let cx=camX(), cy=camY();

    // player
    ctx.beginPath();
    ctx.arc(canvas.width/2,canvas.height/2,player.size,0,Math.PI*2);
    ctx.fillStyle=player.color;
    ctx.fill();

    // mobs
    mobs.forEach(m=>{
        ctx.beginPath();
        ctx.arc(m.x-cx,m.y-cy,12,0,Math.PI*2);
        ctx.fillStyle="brown";
        ctx.fill();
    });

    // foods
    foods.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x-cx,f.y-cy,6,0,Math.PI*2);
        ctx.fillStyle="pink";
        ctx.fill();
    });

    // bullets
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x-cx,b.y-cy,4,0,Math.PI*2);
        ctx.fillStyle="black";
        ctx.fill();
    });

    // ===== HUD =====
    ctx.fillStyle="black";
    ctx.font="18px Arial";

    ctx.fillText("Score: "+score, 20,30);
    ctx.fillText("Speed: "+Math.round(player.speed/baseSpeed*100), 20,55);
    ctx.fillText("Bullet: "+bulletPower, 20,80);

    // ===== ROLL =====
    if(gameState==="roll"){
        ctx.fillStyle="black";
        ctx.globalAlpha=0.7;
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.globalAlpha=1;

        ctx.fillStyle="white";
        ctx.fillText("CLICK!", canvas.width/2-30, canvas.height/2-40);

        if(rollColor){//roll belli olduktan sonra 
            ctx.fillStyle=rollColor;
            ctx.fillRect(canvas.width/2-25, canvas.height/2-25,50,50);
                    if (rollText){
            ctx.fillStyle = "white";
            ctx.font = "22px Arial";
            ctx.fillText(rollText, canvas.width/2 - 60, canvas.height/2 + 50);
}
        }
        

    }
}

// ===== UTILS =====
function dist(a,b){//en yakını bulmak için kullandığımız bir metod 
    let dx=a.x-b.x, dy=a.y-b.y;
    return Math.sqrt(dx*dx+dy*dy);
}

// ===== LOOP =====
let lastMob=0,lastFood=0;

function loop(t){

    if(gameState==="playing"){
        if(t-lastMob>1000){
            spawnMob(); 
            lastMob=t;
        }
        if(t-lastFood>2500){
            spawnFood(); 
            lastFood=t;}
    }

    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
